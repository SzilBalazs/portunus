name: Release

# Builds a self-contained AppImage and attaches it to a GitHub Release.
# Triggered by pushing a version tag (e.g. `git tag v0.1.0 && git push --tags`),
# or run manually from the Actions tab. The AppImage bundles libpdfium, the
# poppler tools, and the English tesseract data so PDF preview, content search,
# and OCR work with nothing installed on the user's machine. libgtk-layer-shell
# is a link dependency of the binary, so linuxdeploy carries it in automatically
# (the layer-shell launcher mode needs it present). bundleMediaFramework (set in
# tauri.bundle.conf.json) bundles the GStreamer plugins below so WebKit audio
# (the timer chime) works inside the AppImage's repointed GStreamer environment.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  appimage:
    # 24.04 ships a newer WebKitGTK 4.1. An AppImage bundles the whole GTK/WebKit
    # stack (the canonical AppImage excludelist deliberately keeps gtk/webkit/glib
    # bundled), so the bundled WebKit is only as new as this build base. A newer
    # base means less input lag on bleeding-edge hosts (e.g. Arch). Trade-off:
    # 24.04's glibc (2.39) means the AppImage won't run on distros older than it
    # (Ubuntu 22.04, Debian 12) - those users should install the .deb below, which
    # links the host's own WebKit and so never lags.
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-layer-shell-dev \
            librsvg2-dev libgtk-3-bin \
            libtesseract-dev libleptonica-dev \
            libssl-dev \
            poppler-utils \
            libfuse2t64 \
            patchelf \
            file desktop-file-utils \
            gstreamer1.0-plugins-base \
            gstreamer1.0-plugins-good \
            gstreamer1.0-plugins-bad \
            gstreamer1.0-libav \
            gstreamer1.0-pulseaudio

      - uses: oven-sh/setup-bun@v2

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Fetch bundled runtime assets
        run: |
          set -euo pipefail
          mkdir -p src-tauri/resources/bin src-tauri/resources/lib src-tauri/resources/tessdata

          # libpdfium: latest prebuilt from bblanchon/pdfium-binaries.
          PDFIUM_TAG=$(curl -fsSL https://api.github.com/repos/bblanchon/pdfium-binaries/releases/latest \
            | grep -oP '"tag_name":\s*"\K[^"]+')
          echo "Using pdfium tag: $PDFIUM_TAG"
          curl -fsSL -o /tmp/pdfium.tgz \
            "https://github.com/bblanchon/pdfium-binaries/releases/download/${PDFIUM_TAG//\//%2F}/pdfium-linux-x64.tgz"
          mkdir -p /tmp/pdfium && tar -xzf /tmp/pdfium.tgz -C /tmp/pdfium
          cp /tmp/pdfium/lib/libpdfium.so src-tauri/resources/libpdfium.so

          # English OCR data (fast model: smaller, plenty accurate for search).
          curl -fsSL -o src-tauri/resources/tessdata/eng.traineddata \
            "https://github.com/tesseract-ocr/tessdata_fast/raw/4.1.0/eng.traineddata"

          # poppler tools, plus the shared libraries they link against (so the
          # bundled binaries run without poppler installed on the host). Core
          # glibc libraries are skipped; linuxdeploy provides those.
          cp "$(command -v pdftotext)" src-tauri/resources/bin/
          cp "$(command -v pdftoppm)" src-tauri/resources/bin/
          for b in pdftotext pdftoppm; do
            ldd "$(command -v "$b")" | awk '/=> \//{print $3}' | while read -r lib; do
              case "$lib" in
                *ld-linux*|*/libc.so*|*/libm.so*|*/libpthread*|*/libdl.so*|*/librt.so*) ;;
                *) cp -n "$lib" src-tauri/resources/lib/ || true ;;
              esac
            done
          done

          # tesseract + leptonica: leptess links these directly into the main
          # binary (OCR is always compiled in). Bundle them so the deb's binary
          # loads them via the rpath baked in the build step below, on any distro
          # - the .deb otherwise relies on the host's tesseract/leptonica, whose
          # soname differs (e.g. Arch's liblept is .so.6, not the .so.5 here).
          # Their leaf deps (libpng/jpeg/tiff/webp/gomp) resolve from the system,
          # always present since the package depends on webkit2gtk.
          mkdir -p src-tauri/resources/ocrlib
          for n in libtesseract.so.5 liblept.so.5; do
            cp "$(ldconfig -p | awk -v l="$n" '$1==l{print $NF; exit}')" src-tauri/resources/ocrlib/
          done

          echo "Bundled assets:" && find src-tauri/resources -type f

      - name: Install JS dependencies
        run: bun install

      - name: Build AppImage
        # The bundle overlay adds the resources/ files fetched above. A plain
        # `bun tauri build` (no overlay) would produce a build with no bundled
        # assets that relies on system pdfium/poppler/tesseract instead.
        # APPIMAGE_EXTRACT_AND_RUN lets linuxdeploy (itself an AppImage) run on
        # hosts without FUSE; NO_STRIP avoids a linuxdeploy strip failure.
        env:
          APPIMAGE_EXTRACT_AND_RUN: "1"
          NO_STRIP: "1"
          # Bake an rpath so the deb's binary finds the bundled tesseract/leptonica
          # at /usr/lib/portunus/ocrlib ($ORIGIN=/usr/bin). GitHub Actions leaves
          # $ORIGIN literal. Harmless for the AppImage (linuxdeploy re-patches it).
          RUSTFLAGS: "-C link-arg=-Wl,-rpath,$ORIGIN/../lib/portunus/ocrlib"
        run: bun tauri build --config src-tauri/tauri.bundle.conf.json

      - name: Upload packages to release
        # The .deb links the host's system WebKit (Tauri auto-adds the dependency)
        # so it never carries an old bundled WebKit and never lags - the no-lag
        # native path for Debian/Ubuntu. The AppImage stays as the portable
        # fallback. (`targets: "all"` in tauri.conf.json already produces the deb.)
        uses: softprops/action-gh-release@v2
        with:
          files: |
            src-tauri/target/release/bundle/appimage/*.AppImage
            src-tauri/target/release/bundle/deb/*.deb
