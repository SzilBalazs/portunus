# Portunus configuration - copy to ~/.config/portunus/config.toml
# All keys are optional; defaults are shown below.

[general]
max_results = 20             # total results displayed in the launcher
onboarding_completed = false # set true after the first-launch wizard runs
layer_shell = false          # Wayland only: use a wlr-layer-shell overlay surface (restart to apply)

[providers]
apps  = true   # .desktop application search
files = true   # file indexer (see [[files.dirs]])
calc  = true   # inline calculator

# Directories indexed by the file provider.
# Each entry requires a `path`; `depth` defaults to 2.
[[files.dirs]]
path  = "~/Downloads"
depth = 2

[[files.dirs]]
path  = "~/Documents"
depth = 2

[dict]
enabled              = true     # dictionary lookup (requires dictd; install: sudo pacman -S dictd)
fill_sparse          = true     # fill sparse result lists with dictionary matches for the typed word
correct_misspellings = true     # allow edit-distance (typo) matches; false = exact word only
copy_definition      = true     # ctrl+c copies first definition; false = copies the word
fill_threshold       = 3        # only fill when fewer than this many non-dict results exist
fill_max             = 5        # max dictionary rows added when filling

[clipboard]
paste_mode  = "auto"   # "auto" = paste into the focused window (needs wtype); "copy" = copy only
max_entries = 250      # max entries loaded into the clipboard browser (clip / portunus --clipboard)
ocr_images   = true    # OCR copied images so their visible text is searchable (cached per image)
ocr_language = "eng"   # Tesseract language for clipboard image OCR

[search]
min_quality    = 0.06  # minimum fuzzy match quality (0.0-1.0); scales with query length
history_weight = 50    # how strongly launch history boosts results (0-100)

[debug]
log_scores  = false    # print nucleo score + threshold for every match candidate to stderr
log_watcher = false    # print content-watcher events and process_event_path decisions to stderr
log_pdf     = false    # print pdfium load/render/encode steps to stderr

[frecency]
enabled        = true
half_life_days = 14.0  # frecency score halves every N days of non-use

# Full-text content search - query must start with ! to activate (e.g. "! invoice 2024").
# system deps: poppler (pdftotext/pdftoppm), tesseract + tesseract-data-eng (OCR)
# re-index on demand: portunus --reindex
[content]
enabled          = false   # master switch
max_file_bytes   = 5242880 # skip files larger than this (bytes); default 5 MB
ocr_images       = true    # run OCR on images
ocr_pdf_fallback = true    # OCR PDFs that contain no extractable text layer
ocr_language     = "eng"   # tesseract language code (requires tesseract-data-<lang>)
threads          = 2       # rayon worker threads for parallel indexing; 0 = all CPU cores

# File formats to index. Remove any you don't need to speed up indexing.
extensions = [
  "pdf",
  "txt", "md", "rst", "csv", "log",
  "toml", "yaml", "yml", "json", "xml",
  "sh", "py", "rs", "js", "ts", "go", "c", "cpp", "h",
  "jpg", "jpeg", "png", "webp", "bmp", "tiff", "tif",
  "docx", "xlsx", "pptx", "odt", "ods", "odp",
]

# Directories to index for content search.
# Each entry requires a `path`; `depth` defaults to 2.
# `extensions` is optional - if set, only those formats are indexed in that directory,
# overriding the global list above. Useful to avoid OCR-heavy formats in large dirs.
[[content.dirs]]
path  = "~/Pictures/Screenshots"
depth = 3

